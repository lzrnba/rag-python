<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat · Rerank Debug</title>
  <style>
    body { font-family: "Segoe UI", "PingFang SC", sans-serif; margin: 0; background: #0b1020; color: #e6eaf2; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .card { background: #121a2d; border: 1px solid #26324d; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input, button, textarea { border-radius: 8px; border: 1px solid #31405f; background: #0f1628; color: #e6eaf2; }
    input, textarea { padding: 10px; }
    textarea { width: 100%; min-height: 90px; }
    button { padding: 10px 14px; cursor: pointer; background: #3b82f6; border-color: #3b82f6; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .muted { color: #8fa0c0; font-size: 13px; }
    .answer { white-space: pre-wrap; line-height: 1.75; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #26324d; padding: 8px; text-align: left; vertical-align: top; }
    th { color: #9fb4d9; }
    .tag { display: inline-block; background: #1f2a44; color: #a8c3ff; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
    .ok { color: #50d890; }
    .warn { color: #f7c66a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>RAG 对话（含 Cross-Encoder 重排可视化）</h2>
      <p class="muted">调用 <code>/v1/chat/completions</code>，返回并展示 <code>retrieved_docs[].rerank_score</code></p>
      <div class="row">
        <input id="baseUrl" style="width:280px" value="http://localhost:8000" />
        <input id="userId" style="width:180px" value="user_demo" />
        <button id="checkDocsBtn" style="background:#22c55e;border-color:#22c55e">检查文档目录</button>
        <button id="sendBtn">发送</button>
      </div>
      <div id="docsInfo" class="muted" style="margin-top:8px">docs_dir: 未检查</div>
      <div style="margin-top:10px">
        <textarea id="query" placeholder="请输入问题，例如：如何创建一个线程？"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <strong>回答</strong>
        <span id="status" class="muted">Idle</span>
      </div>
      <div id="answer" class="answer" style="margin-top:8px"></div>
      <div id="meta" class="muted" style="margin-top:8px"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <strong>检索结果 / 重排分数</strong>
        <span class="muted">final_score / bm25_norm / vector_norm / rerank_score</span>
      </div>
      <table id="docsTable" style="margin-top:8px">
        <thead>
          <tr>
            <th>#</th>
            <th>doc_id</th>
            <th>section_path</th>
            <th>final</th>
            <th>bm25</th>
            <th>vector</th>
            <th>rerank</th>
            <th>preview</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const sendBtn = $('sendBtn');
    const checkDocsBtn = $('checkDocsBtn');
    const docsInfoEl = $('docsInfo');
    const answerEl = $('answer');
    const statusEl = $('status');
    const metaEl = $('meta');
    const tbody = $('docsTable').querySelector('tbody');

    function num(v) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return '-';
      return Number(v).toFixed(4);
    }

    function renderDocs(docs = []) {
      tbody.innerHTML = '';
      docs.forEach((d, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${d.doc_id || ''}${d.neighbor_of ? `<div class="muted">neighbor_of: ${d.neighbor_of}</div>` : ''}</td>
          <td>${d.section_path || ''}</td>
          <td>${num(d.final_score)}</td>
          <td>${num(d.bm25_norm)}</td>
          <td>${num(d.vector_norm)}</td>
          <td>${d.rerank_score == null ? '<span class="warn">N/A</span>' : `<span class="ok">${num(d.rerank_score)}</span>`}</td>
          <td>${(d.content_preview || '').replace(/</g, '&lt;')}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function send() {
      const baseUrl = $('baseUrl').value.trim().replace(/\/$/, '');
      const query = $('query').value.trim();
      const userId = $('userId').value.trim() || 'user_demo';
      if (!query) return;

      sendBtn.disabled = true;
      statusEl.textContent = '请求中...';
      answerEl.textContent = '';
      metaEl.textContent = '';
      renderDocs([]);

      try {
        const resp = await fetch(`${baseUrl}/v1/chat/completions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, user_id: userId, options: { top_k: 5, max_iterations: 3 } })
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const data = await resp.json();
        answerEl.textContent = data.answer || '';

        const confidence = num(data.confidence);
        const mode = data.confidence_mode || '-';
        const docs = data.retrieved_docs || [];
        metaEl.innerHTML = `confidence=${confidence} · mode=${mode} · docs=${docs.length}`;
        renderDocs(docs);

        statusEl.textContent = '完成';
      } catch (e) {
        statusEl.textContent = '失败';
        answerEl.textContent = `请求失败：${e.message}`;
      } finally {
        sendBtn.disabled = false;
      }
    }

    async function checkDocs() {
      const baseUrl = $('baseUrl').value.trim().replace(/\/$/, '');
      docsInfoEl.textContent = 'docs_dir: 检查中...';
      checkDocsBtn.disabled = true;
      try {
        const resp = await fetch(`${baseUrl}/v1/documents/list`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const names = (data.files || []).map(f => f.name).join(', ');
        docsInfoEl.innerHTML = `docs_dir: <b>${data.docs_dir}</b> · 文件数: <b>${data.total}</b>${names ? ` · 文件: ${names}` : ''}`;
      } catch (e) {
        docsInfoEl.textContent = `docs_dir: 检查失败 (${e.message})`;
      } finally {
        checkDocsBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', send);
    checkDocsBtn.addEventListener('click', checkDocs);
    $('query').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) send();
    });

    // 页面加载后自动检查一次文档目录
    checkDocs();
  </script>
</body>
</html>
